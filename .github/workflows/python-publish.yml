name: Python Application Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest # שינוי מ-ubuntu ל-windows
    permissions:
      contents: write

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --name "car_search_app" --onefile --windowed --icon="my_icon.ico" --add-data "icon_copy.ico;." --add-data "icon_delete.ico;." --add-data "icon_search.ico;." --add-data "my_icon.ico;." car_search_app.py
      # שים לב: בווינדוס משתמשים בנקודה-פסיק (;) להפרדת נתיבים ב-add-data

    - name: Get the next version
      id: tag_version
      shell: bash
      run: |
        git fetch --tags --force
        latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0")
        IFS='.' read -r -a version_parts <<< "$latest_tag"
        major=${version_parts[0]}
        minor=${version_parts[1]}
        new_minor=$((minor + 1))
        new_tag="$major.$new_minor"
        echo "new_tag=$new_tag" >> $GITHUB_ENV

    - name: Create a new tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v${{ env.new_tag }}"
        git push origin "v${{ env.new_tag }}"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "v${{ env.new_tag }}"
        release_name: "Release v${{ env.new_tag }}"
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/car_search_app.exe
        asset_name: car_search_app-v${{ env.new_tag }}.exe
        asset_content_type: application/vnd.microsoft.portable-executable
